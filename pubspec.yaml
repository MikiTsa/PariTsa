name: expenses_tracker
description: "A personal expenses tracker application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  uuid: ^4.0.0
  intl: ^0.20.2
  firebase_core: ^4.2.0
  cloud_firestore: ^6.0.3
  firebase_auth: ^6.1.1
  google_sign_in: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/temp_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/google_logo.png
    - assets/temp_icon.png
    - assets/expense_icon.png
    - assets/income_icon.png
    - assets/saving_icon.png